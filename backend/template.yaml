  # ========================================
  # Video Transcoding Function
  # ========================================
  TranscodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-TranscodeFunction"
      Handler: app.handler
      CodeUri: src/transcode/
      Timeout: 900  # 15 minutes for transcoding jobs
      MemorySize: 1024
      Environment:
        Variables:
          APP_TABLE: !Ref AppTable
          MEDIA_BUCKET: !Ref MediaBucket
          MEDIACONVERT_ROLE: !GetAtt MediaConvertRole.Arn
          MEDIACONVERT_ENDPOINT: !Sub "https://mediaconvert.${AWS::Region}.amazonaws.com"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - Statement:
          - Effect: Allow
            Action:
              - mediaconvert:CreateJob
              - mediaconvert:GetJob
              - mediaconvert:ListJobs
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: !GetAtt MediaConvertRole.Arn
      Events:
        MediaConvertStatus:
          Type: CloudWatchEvent
          Properties:
            Pattern:
              source:
                - aws.mediaconvert
              detail-type:
                - MediaConvert Job State Change

  # Permission for S3 to invoke TranscodeFunction
  TranscodeFunctionS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TranscodeFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-media-bucket"

  # MediaConvert IAM Role
  MediaConvertRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: mediaconvert.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Policies:
        - PolicyName: MediaConvertS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "${MediaBucket.Arn}/*"
                  - !GetAtt MediaBucket.Arn

  # S3 Bucket Notification for Video Transcoding (breaks circular dependency)
  MediaBucketNotification:
    Type: Custom::S3BucketNotification
    DependsOn:
      - TranscodeFunctionS3Permission
    Properties:
      ServiceToken: !GetAtt S3NotificationFunction.Arn
      BucketName: !Ref MediaBucket
      NotificationConfiguration:
        LambdaFunctionConfigurations:
          - Events:
              - s3:ObjectCreated:*
            LambdaFunctionArn: !GetAtt TranscodeFunction.Arn
            Filter:
              Key:
                FilterRules:
                  - Name: prefix
                    Value: videos/
                  - Name: suffix
                    Value: .mp4

  S3NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-S3NotificationFunction"
      Handler: index.handler
      Runtime: python3.11
      Timeout: 60
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutBucketNotification
                - s3:GetBucketNotification
              Resource: !Sub "arn:aws:s3:::${AWS::StackName}-media-bucket"
      InlineCode: |
        import boto3
        import cfnresponse
        import json

        def handler(event, context):
            try:
                bucket = event['ResourceProperties']['BucketName']
                notification_config = event['ResourceProperties'].get('NotificationConfiguration', {})
                
                s3 = boto3.client('s3')
                
                if event['RequestType'] in ['Create', 'Update']:
                    # Convert config format for boto3
                    boto_config = {}
                    if 'LambdaFunctionConfigurations' in notification_config:
                        boto_config['LambdaFunctionConfigurations'] = []
                        for config in notification_config['LambdaFunctionConfigurations']:
                            boto_cfg = {
                                'LambdaFunctionArn': config['LambdaFunctionArn'],
                                'Events': config['Events']
                            }
                            if 'Filter' in config:
                                boto_cfg['Filter'] = config['Filter']
                            boto_config['LambdaFunctionConfigurations'].append(boto_cfg)
                    
                    s3.put_bucket_notification_configuration(
                        Bucket=bucket,
                        NotificationConfiguration=boto_config
                    )
                elif event['RequestType'] == 'Delete':
                    s3.put_bucket_notification_configuration(
                        Bucket=bucket,
                        NotificationConfiguration={}
                    )
                
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
            except Exception as e:
                print(f"Error: {e}")
                cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

