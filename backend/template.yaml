AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Social Chat Modern Platform

Parameters:
  JWTSecret:
    Type: String
    NoEcho: true
    Description: JWT secret for token signing (will not be displayed in console)
    MinLength: 32
    Default: "1c81bccde8d25ea03befa78a61e9e5e830d3324351fcfacfd036aa3991f644388467d37310cda2ff40fe6dab16ba4156a53be7c23c9499fa39292a2807af5297"
  EnableRedisCache:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable Redis caching for better performance (adds ~$12/month)

Conditions:
  EnableRedisCache: !Equals [!Ref EnableRedisCache, "true"]

Globals:
  Function:
    Timeout: 15
    Runtime: nodejs20.x
    MemorySize: 512
    Architectures:
      - arm64
    Environment:
      Variables:
        APP_TABLE: !Ref AppTable
        MEDIA_BUCKET: !Ref MediaBucket
        MEDIACONVERT_ENDPOINT: !Sub "https://mediaconvert.${AWS::Region}.amazonaws.com"
        CORS_ORIGINS: "https://buchat.me,https://www.buchat.me,https://admin.buchat.me,http://localhost:3000,http://localhost:3001"
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Requested-With,Accept'"
      AllowOrigin: "'*'"


Resources:

  AppTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AWS::StackName}-AppTable"
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: messageId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: TypeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
        - IndexName: MessageIdIndex
          KeySchema:
            - AttributeName: messageId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      DeletionProtectionEnabled: false

  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::StackName}-media-bucket"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - POST
              - GET
              - HEAD
            AllowedOrigins:
              - "*"
            ExposedHeaders:
              - ETag
              - Content-Type
              - Content-Length
            MaxAge: 3000

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${MediaBucket.Arn}/*'
              - !GetAtt MediaBucket.Arn
            Condition:
              Bool:
                'aws:SecureTransport': false
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${MediaBucket.Arn}/uploads/*'
          - Sid: CloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 's3:GetObject'
            Resource: !Sub '${MediaBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/*'

  # CloudFront CDN for fast media delivery
  MediaCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} Media CDN"
        DefaultRootObject: ""
        PriceClass: PriceClass_100  # Use only North America and Europe (cheapest)
        Origins:
          - Id: S3MediaOrigin
            DomainName: !GetAtt MediaBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt MediaCloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3MediaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin
          ResponseHeadersPolicyId: eaab4381-ed33-4a86-88ca-d9558dc6cd63  # CORS-with-preflight
        CacheBehaviors:
          # Video files - longer cache, optimized for streaming
          - PathPattern: "uploads/video/*"
            TargetOriginId: S3MediaOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf
            ResponseHeadersPolicyId: eaab4381-ed33-4a86-88ca-d9558dc6cd63
          # Image files - aggressive caching
          - PathPattern: "uploads/image/*"
            TargetOriginId: S3MediaOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        HttpVersion: http2and3  # Enable HTTP/3 for better performance
        IPV6Enabled: true

  MediaCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-media-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-PresignFunction"
      Handler: app.handler
      CodeUri: src/presign/
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        PresignApi:
          Type: Api
          Properties:
            Path: /media/presign
            Method: post
        UploadPresignApi:
          Type: Api
          Properties:
            Path: /upload/presign
            Method: post
        TranscodeStatus:
          Type: Api
          Properties:
            Path: /transcode/status/{fileId}
            Method: get

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-UploadFunction"
      Handler: app.handler
      CodeUri: src/upload/
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
      Events:
        Upload:
          Type: Api
          Properties:
            Path: /upload
            Method: post

  PostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-PostsFunction"
      Handler: app.handler
      CodeUri: src/posts/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        GetFeed:
          Type: Api
          Properties:
            Path: /posts
            Method: get
        CreatePost:
          Type: Api
          Properties:
            Path: /posts
            Method: post
        CreateGroupPost:
          Type: Api
          Properties:
            Path: /groups/{name}/posts
            Method: post
        GetPost:
          Type: Api
          Properties:
            Path: /posts/{postId}
            Method: get
        EditPost:
          Type: Api
          Properties:
            Path: /posts/{postId}
            Method: put
        DeletePost:
          Type: Api
          Properties:
            Path: /posts/{postId}
            Method: delete
        SavePost:
          Type: Api
          Properties:
            Path: /posts/{postId}/save
            Method: post
        UnsavePost:
          Type: Api
          Properties:
            Path: /posts/{postId}/save
            Method: delete
        VotePost:
          Type: Api
          Properties:
            Path: /posts/{postId}/vote
            Method: post
        ListPosts:
          Type: Api
          Properties:
            Path: /groups/{name}/posts
            Method: get
        SearchPosts:
          Type: Api
          Properties:
            Path: /posts/search
            Method: get
        TrendingPosts:
          Type: Api
          Properties:
            Path: /posts/trending
            Method: get

  GroupsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-GroupsFunction"
      Handler: app.handler
      CodeUri: src/groups/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        CreateGroup:
          Type: Api
          Properties:
            Path: /groups
            Method: post
        GetGroup:
          Type: Api
          Properties:
            Path: /groups/{name}
            Method: get
        ListGroups:
          Type: Api
          Properties:
            Path: /groups
            Method: get
        JoinGroup:
          Type: Api
          Properties:
            Path: /groups/{name}/join
            Method: post
        LeaveGroup:
          Type: Api
          Properties:
            Path: /groups/{name}/leave
            Method: post
        CheckMembership:
          Type: Api
          Properties:
            Path: /groups/{name}/members/{userId}
            Method: get
        InviteModerator:
          Type: Api
          Properties:
            Path: /groups/{name}/moderators/invite
            Method: post
        RespondModInvite:
          Type: Api
          Properties:
            Path: /groups/{name}/moderators/respond
            Method: post
        RemoveModerator:
          Type: Api
          Properties:
            Path: /groups/{name}/moderators/{userId}
            Method: delete
        GetModerators:
          Type: Api
          Properties:
            Path: /groups/{name}/moderators
            Method: get
        GetMembers:
          Type: Api
          Properties:
            Path: /groups/{name}/members
            Method: get
        UpdateGroupSettings:
          Type: Api
          Properties:
            Path: /groups/{name}
            Method: put
        DiscoverGroups:
          Type: Api
          Properties:
            Path: /groups/discover
            Method: get

  VotingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-VotingFunction"
      Handler: app.handler
      CodeUri: src/voting/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        VoteOnComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/vote
            Method: post

  CommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CommentsFunction"
      Handler: app.handler
      CodeUri: src/comments/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        CreateComment:
          Type: Api
          Properties:
            Path: /posts/{postId}/comments
            Method: post
        GetComments:
          Type: Api
          Properties:
            Path: /posts/{postId}/comments
            Method: get
        GetComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}
            Method: get
        UpdateComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}
            Method: put
        DeleteComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}
            Method: delete
        AddReaction:
          Type: Api
          Properties:
            Path: /comments/{commentId}/reactions
            Method: post
        GetUserReaction:
          Type: Api
          Properties:
            Path: /comments/{commentId}/reactions
            Method: get
        GetAllReactions:
          Type: Api
          Properties:
            Path: /comments/{commentId}/reactions/all
            Method: get
        BatchGetReactions:
          Type: Api
          Properties:
            Path: /comments/reactions/batch
            Method: post
        AwardComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/award
            Method: post
        DistinguishComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/distinguish
            Method: post
        SaveComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/save
            Method: post
        UnsaveComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/save
            Method: delete

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-UsersFunction"
      Handler: app.handler
      CodeUri: src/users/
      Environment:
        Variables:
          JWT_SECRET: !Ref JWTSecret
          GOOGLE_CLIENT_ID: "167865696045-6goc8n18ukodp37ldlv6iaa48055eugn.apps.googleusercontent.com"
          FROM_EMAIL: "psc856@gmail.com"
          FRONTEND_URL: "https://buchat.me"
          BUCKET_NAME: !Ref MediaBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        Register:
          Type: Api
          Properties:
            Path: /auth/register
            Method: post
        Login:
          Type: Api
          Properties:
            Path: /auth/login
            Method: post
        VerifyEmail:
          Type: Api
          Properties:
            Path: /auth/verify
            Method: post
        ResendVerification:
          Type: Api
          Properties:
            Path: /auth/resend
            Method: post
        LinkEmail:
          Type: Api
          Properties:
            Path: /auth/link-email
            Method: post
        GoogleAuth:
          Type: Api
          Properties:
            Path: /auth/google
            Method: post
        CompleteProfile:
          Type: Api
          Properties:
            Path: /auth/complete-profile
            Method: post
        ForgotPassword:
          Type: Api
          Properties:
            Path: /auth/forgot-password
            Method: post
        ResetPassword:
          Type: Api
          Properties:
            Path: /auth/reset-password
            Method: post
        CheckEmailAuth:
          Type: Api
          Properties:
            Path: /auth/check-email/{email}
            Method: get
        CheckUsername:
          Type: Api
          Properties:
            Path: /users/check-username/{username}
            Method: get
        CheckEmail:
          Type: Api
          Properties:
            Path: /users/check-email/{email}
            Method: get
        SearchUsers:
          Type: Api
          Properties:
            Path: /users/search
            Method: get
        CreateUser:
          Type: Api
          Properties:
            Path: /users
            Method: post
        GetUser:
          Type: Api
          Properties:
            Path: /users/{username}
            Method: get
        UpdateUser:
          Type: Api
          Properties:
            Path: /users/{username}
            Method: put
        GetUserPosts:
          Type: Api
          Properties:
            Path: /users/{username}/posts
            Method: get
        GetUserComments:
          Type: Api
          Properties:
            Path: /users/{username}/comments
            Method: get
        GetUserStats:
          Type: Api
          Properties:
            Path: /users/{username}/stats
            Method: get
        GetUserGroups:
          Type: Api
          Properties:
            Path: /users/{username}/groups
            Method: get
        GetUserSuggestions:
          Type: Api
          Properties:
            Path: /users/suggestions
            Method: get
        GetSavedPosts:
          Type: Api
          Properties:
            Path: /users/{username}/saved
            Method: get

  ModerationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ModerationFunction"
      Handler: app.handler
      CodeUri: src/moderation/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
      Events:
        ReportPost:
          Type: Api
          Properties:
            Path: /posts/{postId}/report
            Method: post
        ReportComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/report
            Method: post
        HidePost:
          Type: Api
          Properties:
            Path: /posts/{postId}/hide
            Method: post
        HideComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/hide
            Method: post
        RemovePost:
          Type: Api
          Properties:
            Path: /posts/{postId}/remove
            Method: delete
        RemoveComment:
          Type: Api
          Properties:
            Path: /comments/{commentId}/remove
            Method: delete
        BanUser:
          Type: Api
          Properties:
            Path: /groups/{name}/ban
            Method: post
        UnbanUser:
          Type: Api
          Properties:
            Path: /groups/{name}/ban/{userId}
            Method: delete
        CheckBan:
          Type: Api
          Properties:
            Path: /groups/{name}/ban/{userId}
            Method: get
        SetModerator:
          Type: Api
          Properties:
            Path: /groups/{name}/moderators
            Method: post
        GetPendingReports:
          Type: Api
          Properties:
            Path: /reports/pending
            Method: get
        UpdateReport:
          Type: Api
          Properties:
            Path: /reports/{reportId}
            Method: put

  # Cost-Efficient Redis Cache (Only when ENABLE_REDIS=true)
  MessagingCache:
    Type: AWS::ElastiCache::CacheCluster
    Condition: EnableRedisCache
    Properties:
      CacheNodeType: cache.t3.micro
      Engine: redis
      NumCacheNodes: 1
      Port: 6379
      VpcSecurityGroupIds:
        - !Ref CacheSecurityGroup
      CacheSubnetGroupName: !Ref CacheSubnetGroup

  # Conditional VPC Resources (Only when caching enabled)
  VPC:
    Type: AWS::EC2::VPC
    Condition: EnableRedisCache
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Condition: EnableRedisCache
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Condition: EnableRedisCache
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Condition: EnableRedisCache
    Properties:
      Description: Subnet group for ElastiCache
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: EnableRedisCache
    Properties:
      GroupDescription: Security group for ElastiCache
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: EnableRedisCache
    Properties:
      GroupDescription: Security group for Lambda
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  SocialFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: "Handles social features like messaging, follows, and public key lookups."
      FunctionName: !Sub "${AWS::StackName}-SocialFunction"
      Handler: app.handler
      CodeUri: src/social/
      MemorySize: 1024
      Timeout: 30
      VpcConfig: !If
        - EnableRedisCache
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
        - !Ref AWS::NoValue
      Environment:
        Variables:
          NODE_ENV: production
          ENABLE_XRAY: true
          JWT_SECRET: !Ref JWTSecret
          REDIS_ENDPOINT: !If [EnableRedisCache, !GetAtt MessagingCache.RedisEndpoint.Address, ""]
          REDIS_PORT: !If [EnableRedisCache, !GetAtt MessagingCache.RedisEndpoint.Port, ""]
          ENABLE_CACHING: !Ref EnableRedisCache
          WEBSOCKET_TABLE: !Ref WebSocketConnectionsTable
          WEBSOCKET_API_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WebSocketStage}"

      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
            - !If
              - EnableRedisCache
              - Effect: Allow
                Action:
                  - elasticache:*
                Resource: "*"
              - !Ref AWS::NoValue
      Events:
        FollowUser:
          Type: Api
          Properties:
            Path: /users/{username}/follow
            Method: post
        UnfollowUser:
          Type: Api
          Properties:
            Path: /users/{username}/follow
            Method: delete
        GetFollowers:
          Type: Api
          Properties:
            Path: /users/{username}/followers
            Method: get
        GetFollowing:
          Type: Api
          Properties:
            Path: /users/{username}/following
            Method: get
        # Optimized Messaging Routes
        SendMessage:
          Type: Api
          Properties:
            Path: /messages
            Method: post
        SendMessageV2:
          Type: Api
          Properties:
            Path: /messages/v2
            Method: post
        GetConversationMessages:
          Type: Api
          Properties:
            Path: /conversations/{conversationId}/messages
            Method: get
        GetUserConversations:
          Type: Api
          Properties:
            Path: /conversations
            Method: get
        MarkMessageDelivered:
          Type: Api
          Properties:
            Path: /messages/{messageId}/delivered
            Method: put
        MarkMessageRead:
          Type: Api
          Properties:
            Path: /messages/{messageId}/read
            Method: put
        SetTypingIndicator:
          Type: Api
          Properties:
            Path: /conversations/{conversationId}/typing
            Method: post
        GetTypingUsers:
          Type: Api
          Properties:
            Path: /conversations/{conversationId}/typing
            Method: get
        SetOnlineStatus:
          Type: Api
          Properties:
            Path: /users/online-status
            Method: put
        GetOnlineStatus:
          Type: Api
          Properties:
            Path: /users/{username}/online-status
            Method: get
        SearchMessages:
          Type: Api
          Properties:
            Path: /messages/search
            Method: get
        DeleteMessage:
          Type: Api
          Properties:
            Path: /messages/{messageId}
            Method: delete
        Crosspost:
          Type: Api
          Properties:
            Path: /posts/{postId}/crosspost
            Method: post
        ShareExternal:
          Type: Api
          Properties:
            Path: /posts/{postId}/share
            Method: post
        GetFeed:
          Type: Api
          Properties:
            Path: /feed
            Method: get
        # Legacy routes for backward compatibility
        LegacyGetConversations:
          Type: Api
          Properties:
            Path: /messages/conversations
            Method: get
        LegacyMarkConversationRead:
          Type: Api
          Properties:
            Path: /messages/conversations/{conversationId}/read
            Method: put
        MarkConversationRead:
          Type: Api
          Properties:
            Path: /conversations/{conversationId}/read
            Method: put

        BlockUser:
          Type: Api
          Properties:
            Path: /users/{username}/block
            Method: post
